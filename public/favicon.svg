<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#1a0a3a"/>
      <stop offset="100%" stop-color="#05010f"/>
    </radialGradient>
    <linearGradient id="z" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#12f7ff"/>
      <stop offset="100%" stop-color="#ff2bd6"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- stacked blocks -->
  <g opacity="0.9">
    <rect x="132" y="300" width="80" height="80" rx="10" fill="#8a5bff"/>
    <rect x="216" y="300" width="80" height="80" rx="10" fill="#12f7ff"/>
    <rect x="300" y="300" width="80" height="80" rx="10" fill="#ff2bd6"/>
    <rect x="174" y="216" width="80" height="80" rx="10" fill="#ffe45e"/>
    <rect x="258" y="216" width="80" height="80" rx="10" fill="#4bffa5"/>
  </g>
  <!-- Z monogram -->
  <text x="256" y="250" font-family="Arial Black, Arial, sans-serif" font-weight="900"
        font-size="300" text-anchor="middle" fill="url(#z)" filter="url(#glow)">Z</text>
</svg>
